name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emdash_version:
          - 0.14.0
          - 0.29.0
    name: build-test (emdash@${{ matrix.emdash_version }})
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D emdash@${{ matrix.emdash_version }} --filter @emplugins/emdash-plugin-md-draft
      - run: pnpm build
      - run: pnpm test
      - run: pnpm pack:check
